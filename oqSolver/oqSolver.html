<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>oqSolver - Mudae Oq Target Solver</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d17;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-pink: #ff006a;
            --accent-cyan: #00f0ff;
            --safe-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 0%, #1a1528 0%, #0b0d17 100%);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 0, 106, 0.2);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .status-panel {
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .remaining-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .best-move {
            color: var(--accent-cyan);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .grid-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            aspect-ratio: 1;
        }

        .tile {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tile:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .tile:active {
            transform: translateY(1px);
        }

        .tile.selected {
            border-color: var(--accent-pink);
            box-shadow: 0 0 15px rgba(255, 0, 106, 0.3);
            background: rgba(255, 0, 106, 0.05);
        }

        .prob-text {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 2px;
        }

        .keypad-wrapper {
            position: fixed;
            bottom: -300px;
            left: 0;
            width: 100%;
            background: rgba(15, 17, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px;
            z-index: 100;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
        }

        .keypad-wrapper.visible {
            bottom: 0;
        }

        .keypad {
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .keypad-title {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .key-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 15px 0;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .key-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .key-btn:active {
            transform: scale(0.95);
        }

        .key-target {
            color: var(--accent-pink);
            border-color: var(--accent-pink);
        }

        .key-clear {
            grid-column: span 2;
            background: rgba(255, 68, 68, 0.1);
            border-color: rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .reset-btn:hover {
            color: var(--text-main);
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        #close-keypad {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Mudae Cycle Background Colors */
        .bg-purple {
            background-color: #a855f7 !important;
            border-color: #c084fc !important;
            color: white !important;
        }

        .bg-blue {
            background-color: #3b82f6 !important;
            border-color: #60a5fa !important;
            color: white !important;
        }

        .bg-teal {
            background-color: #14b8a6 !important;
            border-color: #2dd4bf !important;
            color: white !important;
        }

        .bg-green {
            background-color: #10b981 !important;
            border-color: #34d399 !important;
            color: white !important;
        }

        .bg-yellow {
            background-color: #eab308 !important;
            border-color: #facc15 !important;
            color: white !important;
        }

        .bg-orange {
            background-color: #f97316 !important;
            border-color: #fb923c !important;
            color: white !important;
        }

        .bg-red {
            background-color: #ef4444 !important;
            border-color: #f87171 !important;
            color: white !important;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 0, 106, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 0, 106, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 0, 106, 0);
            }
        }

        .guaranteed-target {
            animation: pulse 2s infinite;
            border-color: var(--accent-pink) !important;
        }

        .guaranteed-safe {
            border-color: var(--safe-green) !important;
            box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>

<body>

    <div class="header">
        <a href="../index"
            style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: inline-block;">&larr;
            Back to Home</a>
        <h1>oqSolver</h1>
        <p class="subtitle">5x5 grid solver for the 4-target combination game.</p>
        <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center; align-items: center;">
            <div
                style="background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 8px; border: 1px solid var(--border-color);">
                <span id="clicksRemaining"
                    style="font-weight: 800; color: var(--accent-cyan); font-size: 1.2rem;">7</span>
                <span style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;"> Clicks
                    Left</span>
            </div>
        </div>
        <div
            style="margin-top: 15px; display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap;">
            <label for="bonusValue" style="color: var(--text-muted); font-size: 0.9rem;">Bonus (B):</label>
            <input type="number" id="bonusValue" value="12"
                style="width: 70px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: white; padding: 5px; border-radius: 5px; text-align: center;"
                onchange="updateSolver()">
            <button class="reset-btn" style="margin-top: 0;"
                onclick="document.getElementById('bonusValue').value = 0; updateSolver()">Use Default B=0</button>
        </div>
        <button class="reset-btn" onclick="resetBoard()">Reset Board</button>
    </div>

    <div class="status-panel">
        <div class="remaining-text" id="remainingText">Loading solver...</div>
        <div class="best-move" id="bestMoveText">Please wait while we calculate the first move.</div>
    </div>

    <div class="grid-container">
        <div class="grid" id="grid">
            <!-- Tiles generated by JS -->
        </div>
    </div>
    <div class="keypad-wrapper" id="keypadWrapper">
        <button id="close-keypad" onclick="closeKeypad()">&times;</button>
        <div class="keypad">
            <div class="keypad-title" id="keypadTitle">Select state for tile</div>
            <button class="key-btn bg-blue" onclick="setTileState(0)">0</button>
            <button class="key-btn bg-teal" onclick="setTileState(1)">1</button>
            <button class="key-btn bg-green" onclick="setTileState(2)">2</button>
            <button class="key-btn bg-yellow" onclick="setTileState(3)">3</button>
            <button class="key-btn bg-orange" onclick="setTileState(4)">4</button>
            <button class="key-btn bg-purple" onclick="setTileState('T')">🎯 T</button>
            <button class="key-btn bg-red" onclick="setTileState('R')">🔴 Red</button>
            <button class="key-btn key-clear" onclick="setTileState(null)">❌ Clear</button>
        </div>
    </div>
    <script>
        const GRID_SIZE = 5;
        const NUM_TARGETS = 4;
        let allBoards = [];
        let validBoards = [];
        let tileState = Array(25).fill(null);
        let selectedIndex = null;
        let tsFound = 0;
        let clicksLeft = 7;

        const gridElement = document.getElementById('grid');
        const keypadWrapper = document.getElementById('keypadWrapper');
        const keypadTitle = document.getElementById('keypadTitle');
        const remainingText = document.getElementById('remainingText');
        const bestMoveText = document.getElementById('bestMoveText');

        // Initialize empty grid visuals instantly
        for (let i = 0; i < 25; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${i}`;
            tile.onclick = () => selectTile(i);

            const valueSpan = document.createElement('span');
            valueSpan.id = `value-${i}`;

            const probSpan = document.createElement('span');
            probSpan.className = 'prob-text';
            probSpan.id = `prob-${i}`;

            tile.appendChild(valueSpan);
            tile.appendChild(probSpan);
            gridElement.appendChild(tile);
        }

        // Setup logic asynchronously so UI doesn't freeze
        setTimeout(() => {
            const coords = Array.from({ length: 25 }, (_, i) => i);
            allBoards = getCombinations(coords, NUM_TARGETS);
            validBoards = [...allBoards];
            updateSolver();
        }, 50);

        function getCombinations(arr, k) {
            const results = [];
            function helper(start, combo) {
                if (combo.length === k) {
                    results.push([...combo]);
                    return;
                }
                const remaining = k - combo.length;
                for (let i = start; i <= arr.length - remaining; i++) {
                    combo.push(arr[i]);
                    helper(i + 1, combo);
                    combo.pop(); // backtracking
                }
            }
            helper(0, []);
            return results;
        }

        function getAdjCount(board, r, c) {
            let count = 0;
            for (const tIndex of board) {
                const tr = Math.floor(tIndex / 5);
                const tc = tIndex % 5;
                if (Math.max(Math.abs(tr - r), Math.abs(tc - c)) <= 1 && tIndex !== (r * 5 + c)) {
                    count++;
                }
            }
            return count;
        }

        probabilities = Array(25).fill(0);

        function resetBoard() {
            tileState.fill(null);
            closeKeypad();
            updateSolver();
        }

        function selectTile(index) {
            if (selectedIndex !== null) {
                document.getElementById(`tile-${selectedIndex}`).classList.remove('selected');
            }
            selectedIndex = index;
            document.getElementById(`tile-${selectedIndex}`).classList.add('selected');

            const r = Math.floor(index / 5) + 1;
            const c = (index % 5) + 1;
            keypadTitle.textContent = `Set state for Tile [${r}, ${c}]`;
            keypadWrapper.classList.add('visible');
        }

        function closeKeypad() {
            if (selectedIndex !== null) {
                document.getElementById(`tile-${selectedIndex}`).classList.remove('selected');
                selectedIndex = null;
            }
            keypadWrapper.classList.remove('visible');
        }

        function setTileState(state) {
            if (selectedIndex === null) return;
            tileState[selectedIndex] = state;
            updateSolver(); // Update logic first
            closeKeypad();  // Then close
        }

        function updateSolver() {
            tsFound = tileState.filter(s => s === 'T' || s === 'R').length;
            let numbersFound = tileState.filter(s => typeof s === 'number').length;
            let redFound = tileState.filter(s => s === 'R').length;
            clicksLeft = 7 - numbersFound - redFound;
            document.getElementById('clicksRemaining').textContent = Math.max(0, clicksLeft);

            // Filter valid boards
            validBoards = allBoards.filter(board => {
                for (let i = 0; i < 25; i++) {
                    const state = tileState[i];
                    if (state === null) continue;

                    if (state === 'T' || state === 'R') {
                        if (!board.includes(i)) return false;
                    } else {
                        if (board.includes(i)) return false;
                        const r = Math.floor(i / 5);
                        const c = i % 5;
                        if (getAdjCount(board, r, c) !== state) return false;
                    }
                }
                return true;
            });

            // Calculate probabilities and expected points (Efficiency)
            probabilities.fill(0);
            window.expectedPoints = Array(25).fill(0);
            if (validBoards.length > 0) {
                let tCounts = Array(25).fill(0);
                let expectedNumPtsArray = Array(25).fill(0);

                let B = parseInt(document.getElementById('bonusValue').value) || 0;
                let pointsMapping = [10 + B, 20 + B, 35 + B, 55 + B, 90 + B];
                let targetPts = (tsFound === 3) ? (150 + B) : (5 + B);

                for (const board of validBoards) {
                    for (let i = 0; i < 25; i++) {
                        if (board.includes(i)) {
                            tCounts[i]++;
                        } else {
                            let val = getAdjCount(board, Math.floor(i / 5), i % 5);
                            expectedNumPtsArray[i] += pointsMapping[val];
                        }
                    }
                }
                for (let i = 0; i < 25; i++) {
                    if (tileState[i] !== null) continue;

                    let probT = tCounts[i] / validBoards.length;
                    probabilities[i] = probT;

                    let expectedNumPts = expectedNumPtsArray[i] / validBoards.length;

                    let unkNeighbors = 0;
                    let r = Math.floor(i / 5);
                    let c = i % 5;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            let nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < 5 && nc >= 0 && nc < 5) {
                                if (tileState[nr * 5 + nc] === null) unkNeighbors++;
                            }
                        }
                    }
                    let infoBonus = unkNeighbors * B * 0.2;

                    let expMoves = (tsFound === 3) ? 1.0 : (1 - probT);
                    if (expMoves < 0.0001) expMoves = 0.0001;

                    window.expectedPoints[i] = (probT * targetPts + expectedNumPts + infoBonus) / expMoves;
                }
            } else {
                probabilities.fill(0);
                window.expectedPoints = Array(25).fill(0);
            }

            renderUI();
        }

        function renderUI() {
            let htmlPrefix = (tsFound === 3) ? `<div style="color:#ff4444; font-weight: bold; margin-bottom: 10px;">🚨 3 Purples Found: The RED TILE is revealed!</div>` : '';
            if (validBoards.length === 1) htmlPrefix += `<div style="color: var(--safe-green); font-weight: bold; margin-bottom: 5px;">BOARD COMPLETELY SOLVED!</div>`;
            remainingText.innerHTML = htmlPrefix + `Configurations Left: <b>${validBoards.length.toLocaleString()}</b>`;

            if (validBoards.length === 0) {
                bestMoveText.innerHTML = `<span style="color: #ff4444;">Error: No valid boards left. Check for contradiction!</span>`;
            } else {
                let guaranteedTargets = [];
                let bestGuess = { index: -1, exp: -1, prob: -1 };

                for (let i = 0; i < 25; i++) {
                    if (tileState[i] !== null) continue;
                    const p = probabilities[i];
                    const exp = window.expectedPoints[i];

                    if (p === 1.0) guaranteedTargets.push(i);

                    if (exp > bestGuess.exp) {
                        bestGuess = { index: i, exp: exp, prob: p };
                    }
                }

                if (clicksLeft <= 0 && bestGuess.prob < 1.0) {
                    bestMoveText.innerHTML = `<span style="color: #ff4444;">Out of clicks! Game Over.</span>`;
                } else if (guaranteedTargets.length > 0 && tsFound < 3) {
                    const i = guaranteedTargets[0];
                    bestMoveText.innerHTML = `BEST MOVE: Click <b>[${Math.floor(i / 5) + 1}, ${(i % 5) + 1}]</b>! FREE Guaranteed Target.`;
                } else if (bestGuess.prob === 1.0 && tsFound === 3) {
                    const i = bestGuess.index;
                    bestMoveText.innerHTML = `BEST MOVE: Click <b>[${Math.floor(i / 5) + 1}, ${(i % 5) + 1}]</b>! RED TILE (150+B pts).`;
                } else {
                    const i = bestGuess.index;
                    bestMoveText.innerHTML = `BEST MOVE: Click <b>[${Math.floor(i / 5) + 1}, ${(i % 5) + 1}]</b> (Chance: ${(bestGuess.prob * 100).toFixed(1)}%, Efficiency: ${bestGuess.exp.toFixed(1)})`;
                }

                // If solved and 4 targets found, show farmable
                if (validBoards.length === 1 && tsFound === 4 && clicksLeft > 0) {
                    const b = validBoards[0];
                    let farmable = [];
                    for (let i = 0; i < 25; i++) {
                        if (tileState[i] === null && !b.includes(i)) {
                            let val = getAdjCount(b, Math.floor(i / 5), i % 5);
                            if (val > 0) farmable.push({ loc: `[${Math.floor(i / 5) + 1}, ${(i % 5) + 1}]`, val: val });
                        }
                    }
                    farmable.sort((x, y) => y.val - x.val);
                    if (farmable.length > 0) {
                        let B = parseInt(document.getElementById('bonusValue').value) || 0;
                        let pointsMapping = [10 + B, 20 + B, 35 + B, 55 + B, 90 + B];
                        let text = `<div style="font-size: 0.8rem; color: var(--text-muted); text-align: left; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin-top: 10px;">`;
                        text += `<b style="color: var(--accent-cyan)">FARMING TIME:</b> Use remaining clicks here:<br>`;
                        text += farmable.map(f => `• Click <b>${f.loc}</b> (+${pointsMapping[f.val]} pts)`).join('<br>');
                        text += `</div>`;
                        bestMoveText.innerHTML += text;
                    }
                }
            }

            // Update tiles
            for (let i = 0; i < 25; i++) {
                const tile = document.getElementById(`tile-${i}`);
                const valueSpan = document.getElementById(`value-${i}`);
                const probSpan = document.getElementById(`prob-${i}`);
                const state = tileState[i];
                const prob = probabilities[i];

                tile.className = 'tile' + (i === selectedIndex ? ' selected' : '');
                tile.style.background = '';
                tile.style.borderColor = '';
                tile.style.color = '';

                if (state !== null) {
                    // Revealed state
                    probSpan.textContent = '';
                    if (state === 'T') {
                        valueSpan.textContent = '🎯';
                        tile.classList.add('bg-purple');
                    } else if (state === 'R') {
                        valueSpan.textContent = '🔴';
                        tile.classList.add('bg-red');
                    } else {
                        valueSpan.textContent = state;
                        if (state === 0) tile.classList.add('bg-blue');
                        if (state === 1) tile.classList.add('bg-teal');
                        if (state === 2) tile.classList.add('bg-green');
                        if (state === 3) tile.classList.add('bg-yellow');
                        if (state === 4) tile.classList.add('bg-orange');
                    }
                } else {
                    // Unknown state
                    valueSpan.textContent = '';
                    if (validBoards.length === 0) {
                        probSpan.textContent = '-';
                        tile.style.background = 'rgba(255,255,255,0.05)';
                        tile.style.borderColor = 'rgba(255,255,255,0.1)';
                    } else {
                        let pctString = (prob * 100).toFixed(1).replace('.0', '') + '%';

                        if (prob === 1.0) {
                            valueSpan.textContent = '🎯';
                            probSpan.textContent = '100%';
                            tile.classList.add('guaranteed-target');
                            tile.style.background = 'rgba(255, 0, 106, 0.1)';
                            probSpan.style.color = 'var(--accent-pink)';
                        } else if (prob === 0.0) {
                            valueSpan.textContent = '0%';
                            probSpan.textContent = 'Safe';
                            tile.classList.add('guaranteed-safe');
                            tile.style.background = 'rgba(16, 185, 129, 0.1)';
                            probSpan.style.color = 'var(--safe-green)';
                        } else {
                            probSpan.textContent = pctString;
                            // Interpolate color based on probability
                            let r = 255, g = 255, b = 255, opacity = 0.5;
                            if (prob > 0.5) {
                                g = Math.floor(255 - (prob - 0.5) * 510);
                                b = Math.floor(255 - (prob - 0.5) * 510);
                                opacity = 0.5 + (prob - 0.5);
                            }
                            probSpan.style.color = `rgba(${r}, ${g}, ${b}, ${opacity})`;
                            tile.style.background = 'rgba(255, 255, 255, 0.05)';
                            tile.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                        }
                    }
                }
            }
        }
    </script>
</body>

</html>
