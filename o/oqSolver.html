<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>oqSolver - Mudae Oq Solver</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d17;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-pink: #ff006a;
            --accent-cyan: #00f0ff;
            --safe-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 0%, #1a1528 0%, #0b0d17 100%);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 0, 106, 0.2);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .status-panel {
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .remaining-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .best-move {
            color: var(--accent-cyan);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .grid-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            aspect-ratio: 1;
        }

        .tile {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            overflow: hidden;
            min-height: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            outline: none;
        }

        .tile:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .tile:active {
            transform: translateY(1px);
        }

        .tile.selected {
            border-color: var(--accent-pink) !important;
            box-shadow: inset 0 0 0 1px var(--accent-pink), 0 0 15px rgba(255, 0, 106, 0.3) !important;
            background: rgba(255, 0, 106, 0.05) !important;
            transform: scale(1) !important;
        }

        .prob-text {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 2px;
            min-height: 14px;
            line-height: 14px;
        }

        .keypad-wrapper {
            position: fixed;
            bottom: -300px;
            left: 0;
            width: 100%;
            background: rgba(15, 17, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px;
            z-index: 100;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
        }

        .keypad-wrapper.visible {
            bottom: 0;
        }

        .keypad {
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .keypad-title {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .key-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 15px 0;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .key-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .key-btn:active {
            transform: scale(0.95);
        }

        .key-target {
            color: var(--accent-pink);
            border-color: var(--accent-pink);
        }

        .key-clear {
            grid-column: span 2;
            background: rgba(255, 68, 68, 0.1);
            border-color: rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .reset-btn:hover {
            color: var(--text-main);
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        #close-keypad {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Mudae Cycle Background Colors */
        .bg-purple {
            background-color: #a855f7 !important;
            border-color: #c084fc !important;
            color: white !important;
        }

        .bg-blue {
            background-color: #3b82f6 !important;
            border-color: #60a5fa !important;
            color: white !important;
        }

        .bg-teal {
            background-color: #14b8a6 !important;
            border-color: #2dd4bf !important;
            color: white !important;
        }

        .bg-green {
            background-color: #10b981 !important;
            border-color: #34d399 !important;
            color: white !important;
        }

        .bg-yellow {
            background-color: #eab308 !important;
            border-color: #facc15 !important;
            color: white !important;
        }

        .bg-orange {
            background-color: #f97316 !important;
            border-color: #fb923c !important;
            color: white !important;
        }

        .bg-red {
            background-color: #ef4444 !important;
            border-color: #f87171 !important;
            color: white !important;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 0, 106, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 0, 106, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 0, 106, 0);
            }
        }

        .guaranteed-target {
            animation: pulse 2s infinite;
            border-color: var(--accent-pink) !important;
        }

        .guaranteed-safe {
            border-color: var(--safe-green) !important;
            box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>

<body>

    <div class="header">
        <a href="../index"
            style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: inline-block;">&larr;
            Back to Home</a>
        <br>
        <a href="oqPlay.html"
            style="color: var(--accent-cyan); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: inline-block;">&rarr;
            Play oq</a>
        <h1>oqSolver</h1>
        <p class="subtitle">5x5 grid solver for the 4-target combination game.</p>
        <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center; align-items: center;">
            <div
                style="background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 8px; border: 1px solid var(--border-color);">
                <span id="clicksRemaining"
                    style="font-weight: 800; color: var(--accent-cyan); font-size: 1.2rem;">7</span>
                <span style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;"> Clicks
                    Left</span>
            </div>
        </div>
        <div
            style="margin-top: 15px; display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap;">
            <label for="bonusValue" style="color: var(--text-muted); font-size: 0.9rem;">Bonus (B):</label>
            <input type="number" id="bonusValue" value="12"
                style="width: 70px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: white; padding: 5px; border-radius: 5px; text-align: center;"
                onchange="updateSolver()">
            <button class="reset-btn" style="margin-top: 0;"
                onclick="document.getElementById('bonusValue').value = 0; updateSolver()">Use Default B=0</button>
        </div>
        <button class="reset-btn" onclick="resetBoard()">Reset Board</button>
    </div>

    <div class="status-panel">
        <div class="remaining-text" id="remainingText">Loading solver...</div>
        <div class="best-move" id="bestMoveText">Please wait while we calculate the first move.</div>
    </div>

    <div class="grid-container">
        <div class="grid" id="grid">
            <!-- Tiles generated by JS -->
        </div>
    </div>
    
    <div style="background: rgba(0,0,0,0.2); border: 1px dashed var(--accent-pink); padding: 10px; border-radius: 8px; text-align: left; max-width: 400px; margin: 0 auto 30px auto; user-select: text; -webkit-user-select: text;">
        <div style="font-size: 0.85rem; color: var(--accent-cyan); margin-bottom: 12px; font-family: monospace; word-wrap: break-word; cursor: pointer;" onclick="copyDebug('mov')" title="Click to copy">Mov: <span id="debugMoves" style="color: var(--text-main);">0000000000000000000000000</span></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
            <span style="color: var(--accent-pink); font-weight: bold; font-size: 0.85rem;">MOVE HISTORY LOG</span>
        </div>
        <ul id="solverHistoryList" style="list-style: decimal inside; padding: 0; margin: 0; font-size: 0.8rem; color: var(--text-muted); max-height: 120px; overflow-y: auto;">
        </ul>
    </div>
    <div class="keypad-wrapper" id="keypadWrapper">
        <button id="close-keypad" onclick="closeKeypad()">&times;</button>
        <div class="keypad">
            <div class="keypad-title" id="keypadTitle">Select state for tile</div>
            <button class="key-btn bg-blue" onclick="setTileState(0)">0</button>
            <button class="key-btn bg-teal" onclick="setTileState(1)">1</button>
            <button class="key-btn bg-green" onclick="setTileState(2)">2</button>
            <button class="key-btn bg-yellow" onclick="setTileState(3)">3</button>
            <button class="key-btn bg-orange" onclick="setTileState(4)">4</button>
            <button class="key-btn bg-purple" onclick="setTileState('T')">🎯 T</button>
            <button class="key-btn bg-red" onclick="setTileState('R')">🔴 Red</button>
            <button class="key-btn key-clear" onclick="setTileState(null)">❌ Clear</button>
        </div>
    </div>
    <script>
        const GRID_SIZE = 5;
        const NUM_TARGETS = 4;
        let allBoards = [];
        let validBoards = [];
        let tileState = Array(25).fill(null);
        let selectedIndex = null;
        let tsFound = 0;
        let clicksLeft = 7;

        const gridElement = document.getElementById('grid');
        const keypadWrapper = document.getElementById('keypadWrapper');
        const keypadTitle = document.getElementById('keypadTitle');
        const remainingText = document.getElementById('remainingText');
        const bestMoveText = document.getElementById('bestMoveText');

        // Initialize empty grid visuals instantly
        for (let i = 0; i < 25; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${i}`;
            tile.onclick = () => selectTile(i);

            const valueSpan = document.createElement('span');
            valueSpan.id = `value-${i}`;

            const probSpan = document.createElement('span');
            probSpan.className = 'prob-text';
            probSpan.id = `prob-${i}`;

            tile.appendChild(valueSpan);
            tile.appendChild(probSpan);
            gridElement.appendChild(tile);
        }

        // Setup logic asynchronously so UI doesn't freeze
        setTimeout(() => {
            const coords = Array.from({ length: 25 }, (_, i) => i);
            allBoards = getCombinations(coords, NUM_TARGETS);
            validBoards = [...allBoards];
            updateSolver();
        }, 50);

        function getCombinations(arr, k) {
            const results = [];
            function helper(start, combo) {
                if (combo.length === k) {
                    results.push([...combo]);
                    return;
                }
                const remaining = k - combo.length;
                for (let i = start; i <= arr.length - remaining; i++) {
                    combo.push(arr[i]);
                    helper(i + 1, combo);
                    combo.pop(); // backtracking
                }
            }
            helper(0, []);
            return results;
        }

        function getAdjCount(board, r, c) {
            let count = 0;
            for (const tIndex of board) {
                const tr = Math.floor(tIndex / 5);
                const tc = tIndex % 5;
                if (Math.max(Math.abs(tr - r), Math.abs(tc - c)) <= 1 && tIndex !== (r * 5 + c)) {
                    count++;
                }
            }
            return count;
        }

        probabilities = Array(25).fill(0);
        let debugMovesArray = Array(25).fill(0);
        let debugMoveCount = 0;

        function updateDebugStrings() {
            document.getElementById('debugMoves').textContent = debugMovesArray.join('');
        }

        function copyDebug(type) {
            const el = document.getElementById(type === 'sol' ? 'debugSolution' : 'debugMoves');
            if (el && el.textContent) {
                navigator.clipboard.writeText(el.textContent).then(() => {
                    const originalColor = el.style.color;
                    el.style.color = '#10b981';
                    setTimeout(() => { el.style.color = originalColor; }, 300);
                }).catch(err => console.error('Failed to copy', err));
            }
        }

        function resetBoard() {
            tileState.fill(null);
            debugMovesArray.fill(0);
            debugMoveCount = 0;
            updateDebugStrings();
            document.getElementById('solverHistoryList').innerHTML = '';
            closeKeypad();
            updateSolver();
        }

        function selectTile(index) {
            if (selectedIndex !== null) {
                document.getElementById(`tile-${selectedIndex}`).classList.remove('selected');
            }
            selectedIndex = index;
            document.getElementById(`tile-${selectedIndex}`).classList.add('selected');

            const r = Math.floor(index / 5) + 1;
            const c = (index % 5) + 1;
            keypadTitle.textContent = `Set state for Tile [${r}, ${c}]`;
            keypadWrapper.classList.add('visible');
        }

        function closeKeypad() {
            if (selectedIndex !== null) {
                document.getElementById(`tile-${selectedIndex}`).classList.remove('selected');
                selectedIndex = null;
            }
            keypadWrapper.classList.remove('visible');
        }

        function setTileState(state) {
            if (selectedIndex === null) return;
            const r = Math.floor(selectedIndex / 5) + 1;
            const c = (selectedIndex % 5) + 1;
            
            let logMsg = "";
            if (state === null) {
                logMsg = `Cleared [${r}, ${c}]`;
            } else if (state === 'T') {
                logMsg = `Set [${r}, ${c}] to Target`;
            } else if (state === 'R') {
                logMsg = `Set [${r}, ${c}] to Red`;
            } else {
                logMsg = `Set [${r}, ${c}] to ${state}`;
            }

            if (state === null) {
                if (debugMovesArray[selectedIndex] > 0) {
                    debugMovesArray[selectedIndex] = 0;
                }
            } else {
                if (debugMovesArray[selectedIndex] === 0) {
                    debugMoveCount++;
                    debugMovesArray[selectedIndex] = debugMoveCount;
                }
            }
            updateDebugStrings();

            const hl = document.getElementById('solverHistoryList');
            let li = document.createElement('li');
            li.textContent = logMsg;
            hl.appendChild(li);
            hl.scrollTop = hl.scrollHeight;

            tileState[selectedIndex] = state;
            updateSolver(); // Update logic first
            closeKeypad();  // Then close
        }

        function updateSolver() {
            tsFound = tileState.filter(s => s === 'T' || s === 'R').length;
            let numbersFound = tileState.filter(s => typeof s === 'number').length;
            let redFound = tileState.filter(s => s === 'R').length;
            clicksLeft = 7 - numbersFound - redFound;
            document.getElementById('clicksRemaining').textContent = Math.max(0, clicksLeft);

            // Filter valid boards
            validBoards = allBoards.filter(board => {
                for (let i = 0; i < 25; i++) {
                    const state = tileState[i];
                    if (state === null) continue;

                    if (state === 'T' || state === 'R') {
                        if (!board.includes(i)) return false;
                    } else {
                        if (board.includes(i)) return false;
                        const r = Math.floor(i / 5);
                        const c = i % 5;
                        if (getAdjCount(board, r, c) !== state) return false;
                    }
                }
                return true;
            });

            // Calculate probabilities exclusively
            probabilities.fill(0);
            if (validBoards.length > 0) {
                let tCounts = Array(25).fill(0);

                for (const board of validBoards) {
                    for (let i = 0; i < 25; i++) {
                        if (board.includes(i)) {
                            tCounts[i]++;
                        }
                    }
                }
                for (let i = 0; i < 25; i++) {
                    if (tileState[i] !== null) continue;

                    let probT = tCounts[i] / validBoards.length;
                    probabilities[i] = probT;
                }
            } else {
                probabilities.fill(0);
            }

            renderUI();
        }

        function getAmbigNeighbors(i) {
            let count = 0;
            const r = Math.floor(i / 5), c = i % 5;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < 5 && nc >= 0 && nc < 5) {
                        const nIdx = nr * 5 + nc;
                        if (tileState[nIdx] === null && probabilities[nIdx] > 0.0001 && probabilities[nIdx] < 0.9999) {
                            count++;
                        }
                    }
                }
            }
            return count;
        }

        function renderUI() {
            let htmlPrefix = (tsFound === 3) ? `<div style="color:#ff4444; font-weight: bold; margin-bottom: 10px;">🚨 3 Purples Found: The RED TILE is revealed!</div>` : '';
            if (validBoards.length === 1) htmlPrefix += `<div style="color: var(--safe-green); font-weight: bold; margin-bottom: 5px;">BOARD COMPLETELY SOLVED!</div>`;
            remainingText.innerHTML = htmlPrefix + `Configurations Left: <b>${validBoards.length.toLocaleString()}</b>`;

            if (validBoards.length === 0) {
                bestMoveText.innerHTML = `<span style="color: #ff4444;">Error: No valid boards left. Check for contradiction!</span>`;
            } else {
                const targetsRemaining = 4 - tsFound;
                const revealedCount = tileState.filter(s => s !== null).length;
                const PIVOTS = [6, 8, 16, 18];

                if (revealedCount === 0) {
                    bestMoveText.innerHTML = `BEST MOVE: Open at one of the four symmetric pivots: <b>[2,2]</b>, <b>[2,4]</b>, <b>[4,2]</b>, or <b>[4,4]</b>. Each reveals information about 8 neighbours.`;
                } else {
                    // ── Survival margin ───────────────────────────────────────────
                    // margin = how many "wasted" (non-target) clicks we can still afford
                    // margin ≤ 0 → crisis: every click MUST hit a target to have any chance
                    const margin = clicksLeft - targetsRemaining;

                    // urgency: 0 = relaxed, 1 = crisis
                    const urgency = margin <= 0 ? 1.0 : Math.max(0, 1.0 - margin / 5.0);

                    // INFO_WEIGHT: fades to 0 as urgency rises
                    const INFO_WEIGHT = (1.0 - urgency) * 0.8;
                    const MAX_AMBIG = 8;
                    const POINT_MAP = [10, 20, 35, 55, 90];
                    let B = parseInt(document.getElementById('bonusValue').value) || 0;

                    // ── Expected safe-tile value per position ─────────────────────
                    // For each unknown tile compute: mean adjacency count across all boards
                    // where that tile is NOT a target (weighted by board count).
                    // This tells us the expected tile score if we click it and it's safe.
                    const adjSums   = Array(25).fill(0);
                    const safeCounts = Array(25).fill(0);
                    for (const board of validBoards) {
                        for (let i = 0; i < 25; i++) {
                            if (tileState[i] !== null) continue;
                            if (!board.includes(i)) {
                                safeCounts[i]++;
                                adjSums[i] += getAdjCount(board, Math.floor(i / 5), i % 5);
                            }
                        }
                    }
                    // Expected points (base + B) if clicking tile i and it turns out safe
                    function expectedSafePoints(i) {
                        if (safeCounts[i] === 0) return 0;
                        const ev = adjSums[i] / safeCounts[i]; // expected adjacency 0-4
                        const lo = Math.floor(ev), hi = Math.min(4, Math.ceil(ev));
                        const frac = ev - lo;
                        return POINT_MAP[lo] * (1 - frac) + POINT_MAP[hi] * frac + B;
                    }

                    // Bonus threshold insight: if B is large enough that a free target
                    // "click" is worth more than the expected safe tile value, we should
                    // be even more aggressive about finding targets.
                    // We proxy this by checking B against average expected safe tile pts.
                    const AVG_SAFE_PTS = 35 + B; // rough average
                    // When B is high, each non-target click is still worth a lot, so
                    // the penalty for "wasting" a click isn't as steep from a points
                    // standpoint. But from a WINNING standpoint, the penalty is the same.
                    // We prioritise winning over point maximization always.

                    // ── Score each candidate tile ─────────────────────────────────
                    let guaranteedTargets = [];
                    let candidates = [];

                    for (let i = 0; i < 25; i++) {
                        if (tileState[i] !== null) continue;
                        const p = probabilities[i];
                        if (p === 1.0) { guaranteedTargets.push(i); continue; }

                        const info  = getAmbigNeighbors(i) / MAX_AMBIG; // [0,1]
                        const pb    = PIVOTS.includes(i) ? 0.5 : 0;
                        const epts  = expectedSafePoints(i);

                        // Primary: winning probability (always), scaled by urgency
                        // Secondary: information gain, pivot bonus (when relaxed)
                        // Tertiary: expected point value (only when winning seems assured)
                        const winScore   = p * (1 + urgency);    // boost target-hunting when urgent
                        const infoScore  = INFO_WEIGHT * (info * 0.4 + pb * 0.3);
                        const ptScore    = urgency < 0.3 ? (epts / AVG_SAFE_PTS - 1) * 0.05 : 0;
                        const score      = winScore + infoScore + ptScore;

                        candidates.push({ index: i, score, prob: p, info, epts });
                    }
                    candidates.sort((a, b) => b.score - a.score);
                    const bestGuess = candidates[0] || { index: -1, score: -1, prob: 0, info: 0 };

                    // ── Emit recommendation ───────────────────────────────────────
                    // Show game-state warning
                    let stateTag = '';
                    if (margin <= 0) {
                        stateTag = `<div style="color:#ff4444; font-size:0.8rem; margin-bottom:4px;">⚠️ CRISIS — margin: ${margin}. Must hit a target to survive!</div>`;
                    } else if (margin <= 2) {
                        stateTag = `<div style="color:#fbbf24; font-size:0.8rem; margin-bottom:4px;">⚡ Tight — ${margin} wasted click${margin===1?'':'s'} left before loss.</div>`;
                    }

                    if (clicksLeft <= 0 && bestGuess.prob < 1.0) {
                        bestMoveText.innerHTML = stateTag + `<span style="color: #ff4444;">Out of clicks! Game Over.</span>`;
                    } else if (guaranteedTargets.length > 0 && tsFound < 3) {
                        const i = guaranteedTargets[0];
                        bestMoveText.innerHTML = stateTag + `BEST MOVE: Click <b>[${Math.floor(i / 5) + 1}, ${(i % 5) + 1}]</b>! FREE Guaranteed Target.`;
                    } else if (bestGuess.prob === 1.0 && tsFound === 3) {
                        const i = bestGuess.index;
                        bestMoveText.innerHTML = stateTag + `BEST MOVE: Click <b>[${Math.floor(i / 5) + 1}, ${(i % 5) + 1}]</b>! RED TILE (150+B pts).`;
                    } else if (bestGuess.index !== -1) {
                        const i = bestGuess.index;
                        const infoNote = INFO_WEIGHT > 0.1 ? ` · ${(bestGuess.info * 8).toFixed(0)} ambig nbrs` : '';
                        const urgNote  = urgency > 0.7 ? ` <span style="color:#ff4444">[PRIORITY: find targets!]</span>` : '';
                        bestMoveText.innerHTML = stateTag + `BEST MOVE: Click <b>[${Math.floor(i / 5) + 1}, ${(i % 5) + 1}]</b> (Target: ${(bestGuess.prob * 100).toFixed(1)}%${infoNote})${urgNote}`;

                        // Show top alternatives (2nd and 3rd)
                        if (candidates.length >= 2) {
                            let altText = `<div style="font-size:0.78rem; color:var(--text-muted); margin-top:6px;">Alternatives: `;
                            const alts = candidates.slice(1, 3).map(c => {
                                const row = Math.floor(c.index / 5) + 1, col = (c.index % 5) + 1;
                                return `[${row},${col}] ${(c.prob * 100).toFixed(1)}%`;
                            });
                            altText += alts.join(' &nbsp;·&nbsp; ') + '</div>';
                            bestMoveText.innerHTML += altText;
                        }
                    }

                    // ── Farming (board solved, targets all found) ─────────────────
                    if (validBoards.length === 1 && tsFound === 4 && clicksLeft > 0) {
                        const b = validBoards[0];
                        let farmable = [];
                        for (let i = 0; i < 25; i++) {
                            if (tileState[i] === null && !b.includes(i)) {
                                let val = getAdjCount(b, Math.floor(i / 5), i % 5);
                                farmable.push({ loc: `[${Math.floor(i / 5) + 1}, ${(i % 5) + 1}]`, val, pts: POINT_MAP[val] + B });
                            }
                        }
                        farmable.sort((x, y) => y.pts - x.pts);
                        if (farmable.length > 0) {
                            let text = `<div style="font-size: 0.8rem; color: var(--text-muted); text-align: left; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin-top: 10px;">`;
                            text += `<b style="color: var(--accent-cyan)">FARMING TIME:</b> Click in this order for max points:<br>`;
                            text += farmable.slice(0, clicksLeft).map(f => `• <b>${f.loc}</b> →${f.pts} pts`).join('<br>');
                            text += `</div>`;
                            bestMoveText.innerHTML += text;
                        }
                    }
                }

            }

            // Update tiles
            for (let i = 0; i < 25; i++) {
                const tile = document.getElementById(`tile-${i}`);
                const valueSpan = document.getElementById(`value-${i}`);
                const probSpan = document.getElementById(`prob-${i}`);
                const state = tileState[i];
                const prob = probabilities[i];

                tile.className = 'tile' + (i === selectedIndex ? ' selected' : '');
                tile.style.background = '';
                tile.style.borderColor = '';
                tile.style.color = '';

                if (state !== null) {
                    probSpan.style.display = 'none';
                    if (state === 'T') {
                        valueSpan.textContent = '🎯';
                        tile.classList.add('bg-purple');
                    } else if (state === 'R') {
                        valueSpan.textContent = '🔴';
                        tile.classList.add('bg-red');
                    } else {
                        valueSpan.textContent = state;
                        if (state === 0) tile.classList.add('bg-blue');
                        if (state === 1) tile.classList.add('bg-teal');
                        if (state === 2) tile.classList.add('bg-green');
                        if (state === 3) tile.classList.add('bg-yellow');
                        if (state === 4) tile.classList.add('bg-orange');
                    }
                } else {
                    probSpan.style.display = 'flex';
                    valueSpan.textContent = '';
                    if (validBoards.length === 0) {
                        probSpan.textContent = '-';
                        tile.style.background = 'rgba(255,255,255,0.05)';
                        tile.style.borderColor = 'rgba(255,255,255,0.1)';
                    } else {
                        let pctString = (prob * 100).toFixed(1).replace('.0', '') + '%';
                        if (prob === 1.0) {
                            valueSpan.textContent = '🎯';
                            probSpan.textContent = '100%';
                            tile.classList.add('guaranteed-target');
                            tile.style.background = 'rgba(255, 0, 106, 0.1)';
                            probSpan.style.color = 'var(--accent-pink)';
                        } else if (prob === 0.0) {
                            valueSpan.textContent = '0%';
                            probSpan.textContent = 'Safe';
                            tile.classList.add('guaranteed-safe');
                            tile.style.background = 'rgba(16, 185, 129, 0.1)';
                            probSpan.style.color = 'var(--safe-green)';
                        } else {
                            probSpan.textContent = pctString;
                            let r = 255, g = 255, b = 255, opacity = 0.5;
                            if (prob > 0.5) {
                                g = Math.floor(255 - (prob - 0.5) * 510);
                                b = Math.floor(255 - (prob - 0.5) * 510);
                                opacity = 0.5 + (prob - 0.5);
                            }
                            probSpan.style.color = `rgba(${r}, ${g}, ${b}, ${opacity})`;
                            tile.style.background = 'rgba(255, 255, 255, 0.05)';
                            tile.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                        }
                    }
                }
            }
        }
    </script>
</body>
